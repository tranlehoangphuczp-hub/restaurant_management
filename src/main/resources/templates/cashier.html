<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giao diện Thu ngân</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- CHECK LOGIN -->
<script>
    const user = sessionStorage.getItem('posUser');
    if (!user) {
        window.location.href = '/login';
    }
</script>

<button onclick="logout()" class="btn-logout">Đăng xuất</button>

<div class="container">

    <div class="panel">
        <h3>Sơ đồ bàn</h3>
        <div id="table-grid" class="grid"></div>
    </div>

    <div class="panel">
        <h3>Menu món ăn</h3>
        <div class="menu-filter">
            <select id="category-filter">
                <option value="">Tất cả</option>
                <option value="COM">Cơm</option>
                <option value="BUN_PHO">Bún/Phở</option>
                <option value="BANH_MI">Bánh mì</option>
                <option value="LAU_NUONG">Lẩu/Nướng</option>
                <option value="DO_UONG">Đồ uống</option>
                <option value="AN_VAT">Ăn vặt</option>
                <option value="TRANG_MIENG">Tráng miệng</option>
            </select>

            <input
                    type="text"
                    id="search-input"
                    placeholder="Tìm món..."
                    style="flex:1; padding:5px;"
            >
        </div>

        <!-- GRID MENU -->
        <div id="menu-grid" class="grid"></div>
    </div>

    <!-- HÓA ĐƠN -->
    <div class="panel bill-panel">
        <h3>Hóa đơn: <span id="current-table-name">...</span></h3>

        <div class="bill-list">
            <table id="bill-table">
                <thead>
                <tr>
                    <th>Món</th>
                    <th>SL</th>
                    <th>Giá</th>
                    <th>Tổng</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="bill-items-body"></tbody>
            </table>
        </div>

        <div class="bill-footer">
            <h4>Tổng: <span id="total-price">0đ</span></h4>
            <button onclick="handlePayment()" class="btn-pay">Thanh toán</button>
        </div>
    </div>

</div>

<!-- SCRIPT -->
<script th:src="@{/js/table.js}"></script>
<script th:src="@{/js/menu.js}"></script>

<script>
    window.onload = () => {
        loadTables();
        loadMenu();
    };

    function logout() {
        fetch('/api/auth/logout', { method: 'POST' })
        .then(() => {
            sessionStorage.removeItem('posUser');
            window.location.href = '/login';
        });
    }
</script>

</body>
</html>
